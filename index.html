<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Offline HTML Games Pack</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #0d1117;
            color: #c9d1d9;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }
        .container {
            text-align: center;
            max-width: 600px;
            background-color: #161b22;
            padding: 40px;
            border-radius: 12px;
            border: 1px solid #30363d;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
        }
        h1 {
            color: #58a6ff;
            margin-bottom: 10px;
            font-size: 2rem;
        }
        p {
            color: #8b949e;
            margin-bottom: 30px;
            line-height: 1.5;
        }
        .play-btn {
            display: inline-block;
            background-color: #238636;
            color: #ffffff;
            text-decoration: none;
            padding: 15px 32px;
            font-size: 1.1rem;
            font-weight: 600;
            border-radius: 6px;
            transition: background-color 0.2s;
        }
        .play-btn:hover {
            background-color: #2ea043;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎮 Welcome to Your Game Arcade!</h1>
        <p>Your static site deployment is officially live. Click the button below to launch the central dashboard interface and browse all 300 offline games.</p>
        <a href="./epicviewer.htm" class="play-btn">Open Game Menu</a>
    </div>
</body>
</html>
