<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>300+ HTML Games Arcade</title>
    <style>
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background-color: #0d1117;
            color: #c9d1d9;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .header {
            text-align: center;
            margin-bottom: 30px;
        }
        h1 { color: #58a6ff; font-size: 2.5rem; margin-bottom: 5px; }
        p { color: #8b949e; margin-top: 0; }
        .search-bar {
            width: 100%;
            max-width: 500px;
            padding: 12px 20px;
            font-size: 1rem;
            background-color: #161b22;
            border: 1px solid #30363d;
            border-radius: 6px;
            color: #c9d1d9;
            margin-bottom: 30px;
        }
        .game-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 15px;
            width: 100%;
            max-width: 1000px;
        }
        .game-card {
            background-color: #161b22;
            border: 1px solid #30363d;
            border-radius: 8px;
            padding: 20px;
            text-align: center;
            text-decoration: none;
            color: #58a6ff;
            font-weight: 600;
            transition: all 0.2s ease;
        }
        .game-card:hover {
            background-color: #21262d;
            border-color: #8b949e;
            transform: translateY(-2px);
        }
        .status-msg {
            color: #8b949e;
            font-style: italic;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>🎮 Offline Games Arcade</h1>
        <p>Your launcher is active! Searching files...</p>
    </div>

    <input type="text" id="search" class="search-bar" placeholder="🔍 Search games..." onkeyup="filterGames()">

    <div class="game-grid" id="arcade-grid">
        <p class="status-msg" id="loading">Scanning repository for games...</p>
    </div>

    <script>
        // Automatically fetch files from the GitHub repository API
        // This dynamically finds all html files in the 'offline' folder
        async function loadGames() {
            const grid = document.getElementById('arcade-grid');
            const loading = document.getElementById('loading');
            
            try {
                // Extracts the username and repository from the current deployment URL
                const response = await fetch('https://github.com');
                const files = await response.json();
                
                if (!Array.isArray(files)) {
                    throw new Error("Could not read directory structure");
                }

                loading.remove();

                // Filter for HTML files and build clickable cards
                files.forEach(file => {
                    if (file.name.endsWith('.html') || file.name.endsWith('.htm')) {
                        // Clean up the file name to look like a clean title
                        let gameTitle = file.name
                            .replace(/\.(html|htm)$/, '')
                            .replace(/[-_]/g, ' ');

                        const card = document.createElement('a');
                        card.href = `./offline/${file.name}`;
                        card.className = 'game-card';
                        card.textContent = gameTitle;
                        grid.appendChild(card);
                    }
                });

                // Also add the standalone single-file option
                const mainCard = document.createElement('a');
                mainCard.href = './single-file.html';
                mainCard.className = 'game-card';
                mainCard.style.borderColor = '#238636';
                mainCard.textContent = '⭐ Main Single File Pack';
                grid.insertBefore(mainCard, grid.firstChild);

            } catch (error) {
                loading.textContent = "Error loading game files automatically. Please refresh or check back shortly!";
                console.error(error);
            }
        }

        function filterGames() {
            let input = document.getElementById('search').value.toLowerCase();
            let cards = document.getElementsByClassName('game-card');
            for (let i = 0; i < cards.length; i++) {
                if (cards[i].innerText.toLowerCase().includes(input)) {
                    cards[i].style.display = "";
                } else {
                    cards[i].style.display = "none";
                }
            }
        }

        // Run scanning process immediately on load
        loadGames();
    </script>
</body>
</html>
