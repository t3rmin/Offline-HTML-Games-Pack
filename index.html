<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>300+ HTML Games Arcade</title>
    <style>
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background-color: #0d1117;
            color: #c9d1d9;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .header {
            text-align: center;
            margin-bottom: 30px;
        }
        h1 { color: #58a6ff; font-size: 2.5rem; margin-bottom: 5px; }
        p { color: #8b949e; margin-top: 0; }
        .search-bar {
            width: 100%;
            max-width: 500px;
            padding: 12px 20px;
            font-size: 1rem;
            background-color: #161b22;
            border: 1px solid #30363d;
            border-radius: 6px;
            color: #c9d1d9;
            margin-bottom: 30px;
        }
        .game-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 15px;
            width: 100%;
            max-width: 1000px;
        }
        .game-card {
            background-color: #161b22;
            border: 1px solid #30363d;
            border-radius: 8px;
            padding: 25px 20px;
            text-align: center;
            text-decoration: none;
            color: #58a6ff;
            font-weight: 600;
            transition: all 0.2s ease;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 80px;
        }
        .game-card:hover {
            background-color: #21262d;
            border-color: #58a6ff;
            transform: translateY(-2px);
        }
        .tag {
            font-size: 0.75rem;
            color: #8b949e;
            margin-top: 8px;
            font-weight: normal;
            background: #21262d;
            padding: 2px 8px;
            border-radius: 10px;
            border: 1px solid #30363d;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>🎮 Offline Games Arcade</h1>
        <p>Select a launcher option below to access your game library</p>
    </div>

    <input type="text" id="search" class="search-bar" placeholder="🔍 Search menu options..." onkeyup="filterGames()">

    <div class="game-grid" id="arcade-grid">
        <a href="./single-file.html" class="game-card" style="border-color: #238636;">
            🚀 Main Single File Pack
            <span class="tag" style="color: #56d364;">Bundled Arcade</span>
        </a>
        <a href="./compressed.html" class="game-card">
            🗜️ Compressed Web Pack
            <span class="tag">Alternative Loader</span>
        </a>
        <a href="./file-input.html" class="game-card">
            📁 Custom File Input Loader
            <span class="tag">Local Upload Play</span>
        </a>
    </div>

    <script>
        function filterGames() {
            let input = document.getElementById('search').value.toLowerCase();
            let cards = document.getElementsByClassName('game-card');
            for (let i = 0; i < cards.length; i++) {
                if (cards[i].innerText.toLowerCase().includes(input)) {
                    cards[i].style.display = "flex";
                } else {
                    cards[i].style.display = "none";
                }
            }
        }
    </script>
</body>
</html>
